name: Vitest

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        node-version: [20.x, 22.x, 24.x]
        vitest-version: [2.x, 3.x, 4.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install packages and vitest ${{ matrix.vitest-version }}
        run: |
          npm ci
          npm install vitest@${{ matrix.vitest-version }} --save-dev
          npm run install-all-packages

      - name: Build
        run: npm run build-all-packages
        env:
          CI: true

      - name: Run tests
        run: npm run test
        working-directory: ./packages/vitest
        env:
          CI: true
